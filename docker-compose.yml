services:
  db:
    image: postgres:15
    container_name: jeux-db
    environment:
      POSTGRES_USER: jeux
      POSTGRES_PASSWORD: jeux_dev_pwd
      POSTGRES_DB: jeux
    ports:
      - "5432:5432"
    volumes:
      - jeux_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeux -d jeux"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jeux_pgdata:
